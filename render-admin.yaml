services:
  - type: web
    name: broke-n-built-admin
    env: node
    buildCommand: npm install
    startCommand: node admin-server.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
      - key: ADMIN_NAME
        value: Venkatesh Reddy G
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SYNC_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_TO
        value: brokenbuiltservices@gmail.com
      - key: EMAIL_FROM
        value: brokenbuiltservices@gmail.com
      - key: MAIN_SITE_URL
        value: https://broke-n-built-services.onrender.com
      # PostgreSQL — created on Render and auto-injected into connected services
      - key: DATABASE_URL
        sync: false
