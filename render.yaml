services:
  - type: web
    name: broke-n-built-services
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production

      - key: SESSION_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_TO
        value: brokenbuiltservices@gmail.com
      - key: EMAIL_FROM
        value: brokenbuiltservices@gmail.com
      # Resend (recommended for production — sends via HTTPS, no SMTP port issues)
      - key: RESEND_API_KEY
        sync: false
      # When using Resend, RESEND_FROM must be a domain verified in your Resend account.
      # Default is 'onboarding@resend.dev' which works for testing but shows a footer.
      - key: RESEND_FROM
        sync: false

      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      # PostgreSQL — created on Render and auto-injected into connected services
      - key: DATABASE_URL
        sync: false
